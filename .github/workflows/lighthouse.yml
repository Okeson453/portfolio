name: Lighthouse CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: './lighthouserc.json'
          
      - name: Comment PR with Lighthouse results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read manifest
            const manifestPath = path.join(process.env.GITHUB_WORKSPACE, '.lighthouseci', 'manifest.json');
            if (fs.existsSync(manifestPath)) {
              const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
              
              let comment = '## 🚀 Lighthouse CI Report\n\n';
              comment += '| URL | Performance | Accessibility | Best Practices | SEO |\n';
              comment += '|-----|-------------|---|---|---|\n';
              
              for (const result of manifest.results) {
                const perf = Math.round((result.summary.performance || 0) * 100);
                const a11y = Math.round((result.summary.accessibility || 0) * 100);
                const bp = Math.round((result.summary['best-practices'] || 0) * 100);
                const seo = Math.round((result.summary.seo || 0) * 100);
                
                comment += `| ${result.url} | ${perf} | ${a11y} | ${bp} | ${seo} |\n`;
              }
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
